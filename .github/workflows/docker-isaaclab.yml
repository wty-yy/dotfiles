name: Build and Push Isaac Lab Image

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docker/isaaclab/**'
      - 'docker/ubuntu/**'
      - '.github/workflows/docker-isaaclab.yml'
      - '.github/workflows/docker-ubuntu.yml'
  workflow_dispatch:
    inputs:
      isaaclab_version:
        description: 'Isaac Lab version tag, for example 2.3.2.post1'
        required: false
        default: '2.3.2.post1'

env:
  UBUNTU_TAG: 24.04
  DEFAULT_ISAACLAB_VERSION: 2.3.2.post1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Isaac Lab version
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.isaaclab_version }}" ]; then
            echo "isaaclab_version=${{ github.event.inputs.isaaclab_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "isaaclab_version=${{ env.DEFAULT_ISAACLAB_VERSION }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base Ubuntu image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/ubuntu
          file: ./docker/ubuntu/Dockerfile
          push: true
          build-args: |
            UBUNTU_TAG=${{ env.UBUNTU_TAG }}
          tags: |
            wtyyy/ubuntu:${{ env.UBUNTU_TAG }}

      - name: Build and push Isaac Lab image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/isaaclab
          file: ./docker/isaaclab/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=wtyyy/ubuntu:${{ env.UBUNTU_TAG }}
            ISAACLAB_VERSION=${{ steps.vars.outputs.isaaclab_version }}
          tags: |
            wtyyy/isaaclab:${{ steps.vars.outputs.isaaclab_version }}
